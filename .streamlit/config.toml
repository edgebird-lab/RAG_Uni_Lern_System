# Streamlit-Konfiguration fuer das RAG-Lernsystem
[browser]
# kein E-Mail-Prompt / keine Nutzungsstatistik-Abfrage beim Start
gatherUsageStats = false

[server]
port = 8501
headless = false
# groessere Uploads erlauben (PDFs)
maxUploadSize = 500
# statische Dateien (PWA-Manifest + Icons unter ragapp/ui/static/) ausliefern,
# damit das Handy die App "zum Home-Bildschirm hinzufuegen" kann
enableStaticServing = true

[theme]
base = "light"

[client]
# Kein "Deploy"-Button und kein Entwickler-Menue oben rechts (wirkt wie eine echte App)
toolbarMode = "minimal"
