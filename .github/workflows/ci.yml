name: CI

# Automatisierte Tests: reine, torch-/ollama-/GPU-freie Offline-Logik.
# Es werden KEINE Modelle geladen und KEIN Ollama gestartet.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test-Abhaengigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Syntax-Check (py_compile ueber ragapp)
        run: |
          find ragapp -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Tests (offline, ohne GPU/Modelle/Ollama)
        run: pytest -q
